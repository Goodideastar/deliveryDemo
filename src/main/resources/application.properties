spring.application.name=deliveryDemo
server.port=8080

# 数据库配置
spring.datasource.url=jdbc:mysql://192.168.182.128:3306/delivery_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 连接池配置
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# Redis配置
spring.data.redis.host=192.168.182.128
spring.data.redis.port=6379
spring.data.redis.password=123456789
spring.data.redis.database=0

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.warehouse.deliverydemo.entity

# 日志配置
logging.level.com.warehouse.deliverydemo=info

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# JWT配置
jwt.secret=your-secret-key-must-be-at-least-32-characters-long
jwt.expiration=3600000

# 支付宝配置
alipay.app-id=your-app-id
alipay.private-key=your-private-key
alipay.public-key=your-public-key
alipay.gateway-url=https://openapi.alipaydev.com/gateway.do
alipay.notify-url=http://192.168.1.200:8080/api/order/payment/alipay/callback

# 微信支付配置
wechat.app-id=your-wechat-app-id
wechat.mch-id=your-wechat-mch-id
wechat.api-key=your-wechat-api-key
wechat.notify-url=http://your-server.com/api/order/payment/wechat/callback
wechat.trade-type=JSAPI
